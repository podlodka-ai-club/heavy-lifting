name: Deploy

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  APP_IMAGE_REPOSITORY: ghcr.io/podlodka-ai-club/heavy-lifting
  FRONTEND_IMAGE_REPOSITORY: ghcr.io/podlodka-ai-club/heavy-lifting-frontend

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install uv

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint
        run: make lint

      - name: Typecheck
        run: make typecheck

      - name: Test
        run: make test

      - name: Install frontend dependencies
        run: make frontend-install

      - name: Test frontend
        run: make frontend-test

      - name: Build frontend
        run: make frontend-build

      - name: Log in to GHCR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: echo "$GITHUB_TOKEN" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build backend image
        run: |
          docker build \
            --tag "${APP_IMAGE_REPOSITORY}:master" \
            --tag "${APP_IMAGE_REPOSITORY}:sha-${GITHUB_SHA}" \
            .

      - name: Build frontend image
        run: |
          docker build \
            --file frontend/Dockerfile \
            --tag "${FRONTEND_IMAGE_REPOSITORY}:master" \
            --tag "${FRONTEND_IMAGE_REPOSITORY}:sha-${GITHUB_SHA}" \
            frontend

      - name: Push backend image
        run: |
          docker push "${APP_IMAGE_REPOSITORY}:master"
          docker push "${APP_IMAGE_REPOSITORY}:sha-${GITHUB_SHA}"

      - name: Push frontend image
        run: |
          docker push "${FRONTEND_IMAGE_REPOSITORY}:master"
          docker push "${FRONTEND_IMAGE_REPOSITORY}:sha-${GITHUB_SHA}"

      - name: Configure SSH
        env:
          VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          VPS_SSH_KNOWN_HOSTS: ${{ secrets.VPS_SSH_KNOWN_HOSTS }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$VPS_SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "$VPS_SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy to VPS
        env:
          APP_IMAGE: ghcr.io/podlodka-ai-club/heavy-lifting:sha-${{ github.sha }}
          FRONTEND_IMAGE: ghcr.io/podlodka-ai-club/heavy-lifting-frontend:sha-${{ github.sha }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
        run: |
          set -euo pipefail

          SSH_TARGET="${VPS_USER}@${VPS_HOST}"
          SSH_PORT="${VPS_PORT:-22}"

          ssh -p "$SSH_PORT" "$SSH_TARGET" "mkdir -p \"$VPS_APP_DIR\""
          scp -P "$SSH_PORT" docker-compose.prod.yml "$SSH_TARGET:$VPS_APP_DIR/docker-compose.prod.yml"

          ssh -p "$SSH_PORT" "$SSH_TARGET" "APP_IMAGE='$APP_IMAGE' FRONTEND_IMAGE='$FRONTEND_IMAGE' VPS_APP_DIR='$VPS_APP_DIR' bash -s" <<'REMOTE'
          set -euo pipefail

          cd "$VPS_APP_DIR"
          test -f .env.production

          read_env_value() {
            local env_key="$1"
            local default_value="${2:-}"
            local env_line
            local env_value="$default_value"

            while IFS= read -r env_line || [ -n "$env_line" ]; do
              case "$env_line" in
                "$env_key="*)
                  env_value="${env_line#"$env_key="}"
                  env_value="${env_value%\"}"
                  env_value="${env_value#\"}"
                  env_value="${env_value%\'}"
                  env_value="${env_value#\'}"
                  env_value="${env_value:-$default_value}"
                  break
                  ;;
              esac
            done < .env.production

            printf '%s' "$env_value"
          }

          FRONTEND_PORT="$(read_env_value FRONTEND_PORT 80)"
          frontend_basic_auth_username="$(read_env_value FRONTEND_BASIC_AUTH_USERNAME)"
          frontend_basic_auth_password_hash="$(read_env_value FRONTEND_BASIC_AUTH_PASSWORD_HASH)"
          api_basic_auth_username="$(read_env_value API_BASIC_AUTH_USERNAME)"
          api_basic_auth_password="$(read_env_value API_BASIC_AUTH_PASSWORD)"

          if [ -z "$frontend_basic_auth_username" ] || [ -z "$frontend_basic_auth_password_hash" ]; then
            echo "FRONTEND_BASIC_AUTH_USERNAME and FRONTEND_BASIC_AUTH_PASSWORD_HASH are required for production frontend Basic Auth" >&2
            exit 1
          fi
          if [ -z "$api_basic_auth_username" ] || [ -z "$api_basic_auth_password" ]; then
            echo "API_BASIC_AUTH_USERNAME and API_BASIC_AUTH_PASSWORD are required for the MVP shared Basic Auth contract" >&2
            exit 1
          fi
          if [ "$frontend_basic_auth_username" != "$api_basic_auth_username" ]; then
            echo "FRONTEND_BASIC_AUTH_USERNAME must match API_BASIC_AUTH_USERNAME for the MVP shared Basic Auth contract" >&2
            exit 1
          fi

          docker compose --env-file .env.production -f docker-compose.prod.yml pull
          docker compose --env-file .env.production -f docker-compose.prod.yml run --interactive=false -T --rm bootstrap
          docker compose --env-file .env.production -f docker-compose.prod.yml up -d --remove-orphans

          healthcheck_curl_args=(-fsS --user "${api_basic_auth_username}:${api_basic_auth_password}")
          healthcheck_url="http://127.0.0.1:${FRONTEND_PORT}/api/health"
          ready=0
          attempt=1
          while [ "$attempt" -le 30 ]; do
            echo "Checking frontend proxy readiness (${attempt}/30): ${healthcheck_url}"
            if curl "${healthcheck_curl_args[@]}" "$healthcheck_url"; then
              ready=1
              break
            fi
            sleep 2
            attempt=$((attempt + 1))
          done

          if [ "$ready" -ne 1 ]; then
            echo "Frontend proxy did not become ready before timeout" >&2
            docker compose --env-file .env.production -f docker-compose.prod.yml logs --tail=100 frontend >&2 || true
            docker compose --env-file .env.production -f docker-compose.prod.yml logs --tail=100 api >&2 || true
            exit 1
          fi
          REMOTE
