<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AI Coding Foundry — Agent Floor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@500;700;800&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box}
    html,body,#root{margin:0;padding:0;background:#050302;min-height:100vh;width:100%}
    body{
      font-family: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;
      color:#e8d8a8;
      -webkit-font-smoothing:antialiased;
      overflow-x:hidden;
    }
    /* Bracket scanline texture across page edge */
    body::before{
      content:"";position:fixed;inset:0;pointer-events:none;z-index:1000;
      background:
        radial-gradient(ellipse at top, transparent 60%, rgba(0,0,0,0.4) 100%),
        repeating-linear-gradient(0deg,rgba(255,255,255,0) 0,rgba(255,255,255,0) 2px,rgba(0,0,0,0.06) 3px);
      mix-blend-mode:multiply;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="sim.jsx"></script>
  <script type="text/babel" src="factory.jsx"></script>
</body>
</html>
